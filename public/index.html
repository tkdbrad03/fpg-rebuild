<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2D5016">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Florida Players Group</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        .splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a3009;
        }
        
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/Golf_Course.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            animation: fadeInBg 1.5s ease-out 0.3s forwards;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(26, 48, 9, 0.7) 0%,
                rgba(45, 80, 22, 0.5) 40%,
                rgba(45, 80, 22, 0.6) 70%,
                rgba(26, 48, 9, 0.85) 100%
            );
        }
        
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        
        .logo-container {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s ease-out 0.8s forwards;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .logo-container img {
            width: 148px;
            height: 148px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }
        
        .title {
            color: #F5C518;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 36px;
            font-weight: 800;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s ease-out 1.2s forwards;
        }
        
        .tagline {
            color: rgba(255, 255, 255, 0.95);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s ease-out 1.5s forwards;
        }
        
        /* Enter Button */
        .enter-btn {
            margin-top: 50px;
            padding: 16px 48px;
            background: linear-gradient(135deg, #F5C518, #d4a817);
            color: #1a3009;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 30px rgba(245, 197, 24, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s ease-out 2s forwards;
            transition: all 0.3s ease;
        }
        
        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(245, 197, 24, 0.5);
        }
        
        .enter-btn:active {
            transform: translateY(0);
        }
        
        /* Animations */
        @keyframes fadeInBg {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Fade out when leaving */
        .splash-container.fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="splash-container" id="splashContainer">
        <div class="background-image"></div>
        <div class="overlay"></div>
        
        <div class="content">
            <div class="logo-container">
                <img src="/logo.png" alt="FPG Logo">
            </div>
            <h1 class="title">Florida Players Group</h1>
            <p class="tagline">Good Golf · Good Friends · Good Times</p>
            
            <button class="enter-btn" onclick="enterApp()">Enter</button>
        </div>
    </div>

    <script>
        // Check if user is already authenticated
        function isAuthenticated() {
            const token = localStorage.getItem('fpg_token');
            if (!token) return false;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return Date.now() < payload.exp * 1000;
            } catch (e) {
                return false;
            }
        }
        
        // Navigate to appropriate page
        function enterApp() {
            const splash = document.getElementById('splashContainer');
            splash.classList.add('fade-out');
            
            setTimeout(() => {
                if (isAuthenticated()) {
                    window.location.href = '/dashboard.html';
                } else {
                    window.location.href = '/login.html';
                }
            }, 500);
        }
    </script>
</body>
</html>
